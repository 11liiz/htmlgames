<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Red Light Green Light</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;touch-action:none;user-select:none}
canvas{display:block;max-width:100vw;max-height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,FT,FB,DY,FY,SY;

const resize=()=>{
  W=c.width=Math.min(window.innerWidth,480);
  H=c.height=window.innerHeight;
  FT=H*.17;FB=H;DY=FT+H*.07;FY=FT+H*.16;SY=H-.08*H;
};
resize();window.addEventListener('resize',()=>{resize();init()});

// STATE
let phase='green',pt=200,da=0,wave=1,flash=0,shk=0,autoNext=0;
const GD=()=>Math.max(120,190-wave*8), RD=()=>Math.max(70,130-wave*6);

// PLAYERS
let P=[];
const SC=['#3a7a4e','#2d6040','#4a8a5a'],MC=['#cc2020','#bb1818','#dd2828'];

const mkP=(i,n)=>{
  const cols=5,sp=W/(cols+1);
  return{
    x:sp*(i%cols+1)+(Math.random()-.5)*16,
    y:SY-Math.floor(i/cols)*32-Math.random()*8,
    n:100+Math.floor(Math.random()*900),
    s:SC[i%SC.length],m:MC[i%MC.length],
    spd:.5+Math.random()*.65,
    dead:0,won:0,mv:0,lt:Math.random()*6.28,
    rk:Math.random()<.2,br:0
  };
};

const init=()=>{
  P=Array.from({length:20+wave*2},(_,i)=>mkP(i));
  phase='green';pt=GD()+100;da=0;autoNext=0;
};

// KILL
const kill=p=>{
  if(p.dead)return;
  p.dead=1;p.mv=0;
  flash=Math.min(flash+.3,1);shk=Math.max(shk,12);
};

// UPDATE
const update=()=>{
  pt=Math.max(0,pt-1);
  if(phase==='green'){
    P.forEach(p=>{
      if(p.dead||p.won)return;
      p.mv=1;p.y-=p.spd;p.lt+=.16;
      if(p.y<=FY){p.won=1;p.y=FY;}
    });
    if(pt<=0){phase='turn';pt=35;}
  } else if(phase==='turn'){
    da=Math.min(1,da+1/35);
    if(pt<=0){
      phase='red';pt=RD()+Math.random()*60;
      P.forEach(p=>{if(!p.dead&&!p.won&&p.mv&&Math.random()<.88)kill(p);p.mv=0;});
    }
  } else if(phase==='red'){
    P.forEach(p=>{
      if(p.dead||p.won)return;
      if(p.rk&&Math.random()<.005){p.mv=1;p.y-=p.spd*.4;if(Math.random()<.75)kill(p);}
    });
    if(pt<=0){phase='back';pt=35;}
  } else if(phase==='back'){
    da=Math.max(0,da-1/35);
    if(pt<=0){phase='green';pt=GD()+Math.random()*80;}
  }

  P.forEach(p=>{if(p.dead&&p.br<16)p.br+=.2;});
  if(flash>0)flash-=.05;
  if(shk>0)shk--;

  const alive=P.filter(p=>!p.dead);
  if(alive.length&&alive.every(p=>p.won)&&!autoNext){autoNext=150;}
  if(!alive.length&&!autoNext)autoNext=120;
  if(autoNext>0&&--autoNext===0){wave++;init();}
};

// DRAW HELPERS
const circle=(cx,cy,r,fill,stroke,lw)=>{
  x.beginPath();x.arc(cx,cy,r,0,6.28);
  if(fill){x.fillStyle=fill;x.fill();}
  if(stroke){x.strokeStyle=stroke;x.lineWidth=lw||1;x.stroke();}
};
const rect=(rx,ry,rw,rh,fill,stroke,lw)=>{
  if(fill){x.fillStyle=fill;x.fillRect(rx,ry,rw,rh);}
  if(stroke){x.strokeStyle=stroke;x.lineWidth=lw||1;x.strokeRect(rx,ry,rw,rh);}
};
const ellipse=(cx,cy,rx,ry,fill)=>{
  x.beginPath();x.ellipse(cx,cy,rx,ry,0,0,6.28);x.fillStyle=fill;x.fill();
};

// DRAW DOLL
const drawDoll=()=>{
  const dx=W*.5,dy=DY,f=da>.5;
  x.save();
  if(f){x.translate(W,0);x.scale(-1,1);}
  const d=f?W-dx:dx;

  // dress
  x.fillStyle='#e07818';
  x.beginPath();x.moveTo(d-10,dy-50);x.lineTo(d+10,dy-50);
  x.lineTo(d+15,dy-14);x.lineTo(d-15,dy-14);x.closePath();x.fill();

  // legs
  x.strokeStyle='#fff';x.lineWidth=3.5;x.lineCap='round';
  x.beginPath();x.moveTo(d-4,dy-14);x.lineTo(d-6,dy+2);x.stroke();
  x.beginPath();x.moveTo(d+4,dy-14);x.lineTo(d+6,dy+2);x.stroke();

  // neck+head
  x.fillStyle='#f0c090';x.fillRect(d-3,dy-62,6,12);
  ellipse(d,dy-72,11,13,'#f0c090');
  ellipse(d,dy-78,12,9,'#111');

  if(f){
    // creepy eyes
    x.fillStyle='#111';
    x.beginPath();x.ellipse(d-4,dy-73,3,4,0,0,6.28);x.fill();
    x.beginPath();x.ellipse(d+4,dy-73,3,4,0,0,6.28);x.fill();
    x.fillStyle='#fff';
    circle(d-3.2,dy-74,1.1,'#fff');circle(d+4.8,dy-74,1.1,'#fff');
    x.strokeStyle='#904030';x.lineWidth=1.2;
    x.beginPath();x.arc(d,dy-67,3.5,.2,2.94);x.stroke();
  }
  x.restore();

  // flanking guards
  [W*.1,W*.22,W*.78,W*.9].forEach(gx=>drawGuard(gx,DY+6,.7));
};

const drawGuard=(gx,gy,s)=>{
  x.fillStyle='#8b1a1a';x.fillRect(gx-6*s,gy-18*s,12*s,18*s);
  ellipse(gx,gy-24*s,6*s,7*s,'#f0c090');
  ellipse(gx,gy-24*s,5.5*s,6.5*s,'#cc1111');
};

// DRAW PLAYER
const drawP=p=>{
  if(p.won)return;
  const{x:px,y:py,s,m,mv,lt,dead,br,n}=p;

  if(dead){
    // blood pool
    if(br>0){
      const g=x.createRadialGradient(px,py+1,0,px,py+1,br);
      g.addColorStop(0,'rgba(150,0,0,.85)');g.addColorStop(1,'rgba(80,0,0,0)');
      x.beginPath();x.ellipse(px,py+1,br,br*.35,0,0,6.28);x.fillStyle=g;x.fill();
    }
    x.save();x.translate(px,py);x.rotate(Math.PI/2);
    x.fillStyle=s;x.fillRect(-7,-11,14,20);
    ellipse(0,-12,5,4,'#f0c090');
    x.restore();return;
  }

  const k=.8,la=mv?Math.sin(lt)*.42:0;
  x.save();x.translate(px,py);

  // shadow
  ellipse(0,2,8*k,2.5*k,'rgba(0,0,0,.14)');

  // legs
  x.strokeStyle=s;x.lineWidth=3.5*k;x.lineCap='round';
  x.beginPath();x.moveTo(-2*k,0);x.lineTo(-3*k+Math.sin(la)*6*k,13*k);x.stroke();
  x.beginPath();x.moveTo(2*k,0);x.lineTo(3*k-Math.sin(la)*6*k,13*k);x.stroke();

  // body
  x.fillStyle=s;x.fillRect(-7*k,-19*k,14*k,20*k);

  // arms
  x.strokeStyle=s;x.lineWidth=2.8*k;
  x.beginPath();x.moveTo(-7*k,-15*k);x.lineTo(-13*k,-6*k);x.stroke();
  x.beginPath();x.moveTo(7*k,-15*k);x.lineTo(13*k,-6*k);x.stroke();

  // head + mask
  ellipse(0,-26*k,7*k,8*k,'#f0c090');
  ellipse(0,-26*k,6.5*k,7.5*k,m);

  // mask symbol
  x.strokeStyle='rgba(0,0,0,.45)';x.lineWidth=.9;
  const sh=n%3;
  if(sh===0){x.beginPath();x.arc(0,-26*k,2.8*k,0,6.28);x.stroke();}
  else if(sh===1){x.beginPath();x.moveTo(0,-29*k);x.lineTo(2.8*k,-23*k);x.lineTo(-2.8*k,-23*k);x.closePath();x.stroke();}
  else{x.strokeRect(-2.8*k,-29*k,5.6*k,5.6*k);}

  // number
  x.fillStyle='#ffffffcc';x.font=`bold ${5.5*k}px monospace`;x.textAlign='center';
  x.fillText(n,0,-9*k);
  x.restore();
};

// DRAW FIELD
const drawField=()=>{
  // sky
  const sky=x.createLinearGradient(0,FT,0,H*.44);
  sky.addColorStop(0,'#7ec8e3');sky.addColorStop(1,'#c8e8f8');
  x.fillStyle=sky;x.fillRect(0,FT,W,H*.44-FT);

  // ground
  const gr=x.createLinearGradient(0,H*.43,0,H);
  gr.addColorStop(0,'#c8a86a');gr.addColorStop(.08,'#d4b478');gr.addColorStop(1,'#b89050');
  x.fillStyle=gr;x.fillRect(0,H*.43,W,H);

  // clouds
  x.fillStyle='rgba(255,255,255,.88)';
  [[W*.12,H*.2,28,11],[W*.5,H*.19,42,15],[W*.83,H*.21,25,9]].forEach(([cx,cy,rw,rh])=>{
    ellipse(cx,cy,rw,rh,'rgba(255,255,255,.88)');
    ellipse(cx-rw*.35,cy+rh*.4,rw*.55,rh*.65,'rgba(255,255,255,.88)');
    ellipse(cx+rw*.35,cy+rh*.4,rw*.55,rh*.65,'rgba(255,255,255,.88)');
  });

  // dead tree
  const[tx,ty]=[W*.5,H*.43];
  x.strokeStyle='#3a2a18';x.lineCap='round';x.lineWidth=5;
  x.beginPath();x.moveTo(tx,ty);x.lineTo(tx,ty-52);x.stroke();
  x.lineWidth=2.2;
  [[-18,-18,-36,-38],[-12,-16,-5,-36],[18,-18,36,-38],[12,-16,5,-36],[-26,-8,-38,0],[26,-8,38,0]]
    .forEach(([a,b,c,d])=>{x.beginPath();x.moveTo(tx+a*.7,ty+b*.7);x.lineTo(tx+c*.8,ty+d*.8);x.stroke();});

  // finish line
  x.strokeStyle='rgba(255,80,130,.9)';x.lineWidth=2.5;x.setLineDash([]);
  x.beginPath();x.moveTo(0,FY);x.lineTo(W,FY);x.stroke();
  x.fillStyle='rgba(255,80,130,.08)';x.fillRect(0,FY-6,W,12);

  // side guards
  const gy=FY+(SY-FY)*.28;
  drawGuard(W*.04,gy,.78);drawGuard(W*.12,gy+18,.75);
  drawGuard(W*.88,gy,.78);drawGuard(W*.96,gy+18,.75);
};

// DRAW HUD
const drawHUD=()=>{
  const hh=FT,pad=7;
  rect(0,0,W,hh,'#0c0c0c');
  x.strokeStyle='#2a2a2a';x.lineWidth=1;
  x.beginPath();x.moveTo(0,hh);x.lineTo(W,hh);x.stroke();

  // TIMER (left)
  rect(pad,pad,82,hh-pad*2,'#141414','#2a2a2a',1);
  x.fillStyle='#ffcc00';x.font=`11px serif`;x.textAlign='left';x.fillText('♛',pad+5,pad+14);
  const sec=Math.max(0,Math.ceil(pt/60));
  x.fillStyle='#ff3333';x.font=`bold ${Math.floor(hh*.44)}px monospace`;x.textAlign='center';
  x.fillText(`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`,pad+41,hh*.76);

  // EYES (center)
  const ew=W*.38,eh=hh-pad*2,ex2=W/2-ew/2,ey2=pad;
  rect(ex2,ey2,ew,eh,'#050505','#2a2a2a',1.5);
  const e1x=ex2+ew*.28,e2x=ex2+ew*.72,ecy=ey2+eh*.52;
  const erx=ew*.19,ery=eh*.36;
  // whites
  [e1x,e2x].forEach(ex=>{
    ellipse(ex,ecy,erx,ery,'#ede5d5');
    ellipse(ex,ecy,erx*.56,ery*.7,'#251508');
    ellipse(ex,ecy,erx*.26,ery*.36,'#000');
    circle(ex+erx*.15,ecy-ery*.18,erx*.1,'#fff');
    // lids
    x.fillStyle='#c8a070';
    x.beginPath();x.ellipse(ex,ey2+eh*.2,erx*1.08,ery*.52,0,Math.PI,Math.PI*2);x.fill();
    x.beginPath();x.ellipse(ex,ey2+eh*.82,erx*1.08,ery*.45,0,0,Math.PI);x.fill();
  });

  // LIGHT (right of eyes)
  const lx=ex2+ew+pad+8,lw2=60,lh2=hh-pad*2;
  rect(lx,pad,lw2,lh2,'#141414','#2a2a2a',1);
  const isG=phase==='green'||phase==='back';
  const col=isG?'#00ff55':phase==='red'?'#ff2222':'#ff9900';
  const g2=x.createRadialGradient(lx+lw2/2,pad+lh2*.44,0,lx+lw2/2,pad+lh2*.44,lh2*.36);
  g2.addColorStop(0,col);g2.addColorStop(1,'rgba(0,0,0,0)');
  x.beginPath();x.ellipse(lx+lw2/2,pad+lh2*.44,lh2*.36,lh2*.36,0,0,6.28);x.fillStyle=g2;x.fill();
  circle(lx+lw2/2,pad+lh2*.44,lh2*.2,col);
  x.fillStyle='#888';x.font=`bold 8px monospace`;x.textAlign='center';
  x.fillText(isG?'GREEN':phase==='red'?'RED':'...',lx+lw2/2,pad+lh2*.88);

  // ALIVE count (far right)
  const ax=lx+lw2+pad+4,aw=W-ax-pad;
  rect(ax,pad,aw,lh2,'#141414','#2a2a2a',1);
  const alive=P.filter(p=>!p.dead).length;
  // mini icon
  x.fillStyle='#3a7a4e';x.fillRect(ax+aw/2-4,pad+5,8,11);
  ellipse(ax+aw/2,pad+5,4,4.5,'#f0c090');
  x.fillStyle='#ff3333';x.font=`bold ${Math.floor(hh*.42)}px monospace`;x.textAlign='center';
  x.fillText(alive,ax+aw/2,hh*.84);
  x.fillStyle='#444';x.font=`7px monospace`;x.fillText(`W${wave}`,ax+aw/2,pad+lh2*.95);
};

// OVERLAY
const drawOverlay=()=>{
  if(flash>0){x.fillStyle=`rgba(255,180,100,${flash*.25})`;x.fillRect(0,0,W,H);}
  if(autoNext>0&&(phase==='green'&&P.every(p=>p.won||p.dead))){
    x.fillStyle='rgba(0,0,0,.6)';x.fillRect(0,0,W,H);
    x.fillStyle='#00ff55';x.font=`bold ${W*.065}px monospace`;x.textAlign='center';
    x.fillText('WAVE CLEAR',W/2,H*.44);
    x.fillStyle='#fff';x.font=`${W*.038}px monospace`;
    x.fillText(`${P.filter(p=>p.won).length} survived`,W/2,H*.54);
    x.fillStyle='#555';x.font=`${W*.028}px monospace`;
    x.fillText('Next wave...',W/2,H*.62);
  }
};

// RENDER
const render=()=>{
  x.save();
  if(shk>0)x.translate((Math.random()-.5)*shk*.5,(Math.random()-.5)*shk*.4);
  drawField();drawDoll();
  [...P].sort((a,b)=>a.y-b.y).forEach(drawP);
  x.restore();
  drawHUD();drawOverlay();
};

const loop=()=>{update();render();requestAnimationFrame(loop);};
canvas.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
init();requestAnimationFrame(loop);
</script>
</body>
</html>
