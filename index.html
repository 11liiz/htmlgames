<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Red Light Green Light</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
canvas{position:fixed;top:0;left:0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Setup
var cv = document.getElementById('c');
var cx = cv.getContext('2d');
cv.width = window.innerWidth;
cv.height = window.innerHeight;
var W = cv.width;
var H = cv.height;

// Layout
var HH = Math.floor(H * 0.2);
var FY = HH + Math.floor((H - HH) * 0.2);
var SY = H - 80;

// Game vars
var phase = 'green';
var pt = 250;
var dollFace = 0;
var wave = 1;
var shk = 0;
var flash = 0;
var nxt = 0;

// Players array
var PL = [];
var SUIT = '#3d7a50';
var MASKS = ['#cc2020','#bb1515','#dd2525'];

function mkP(i) {
  var cols = 5;
  var sp = W / (cols + 1);
  return {
    x: sp * (i % cols + 1) + (Math.random() - 0.5) * 12,
    y: SY - Math.floor(i / cols) * 36 - Math.random() * 8,
    num: 100 + Math.floor(Math.random() * 900),
    mask: MASKS[i % 3],
    spd: 0.5 + Math.random() * 0.65,
    dead: 0, won: 0, mv: 0,
    lt: Math.random() * 6.28,
    rk: Math.random() < 0.18,
    br: 0
  };
}

function init() {
  PL = [];
  var count = 22 + wave * 2;
  for (var i = 0; i < count; i++) PL.push(mkP(i));
  phase = 'green';
  pt = 220 + 80;
  dollFace = 0;
  flash = 0; shk = 0; nxt = 0;
}

function kill(p) {
  if (p.dead || p.won) return;
  p.dead = 1; p.mv = 0;
  flash = Math.min(flash + 0.3, 1);
  shk = Math.max(shk, 12);
}

function update() {
  pt = Math.max(0, pt - 1);

  if (phase === 'green') {
    for (var i = 0; i < PL.length; i++) {
      var p = PL[i];
      if (p.dead || p.won) continue;
      p.mv = 1; p.y -= p.spd; p.lt += 0.16;
      if (p.y <= FY) { p.won = 1; p.y = FY; }
    }
    if (pt <= 0) { phase = 'turn'; pt = 36; dollFace = 0; }
  }
  else if (phase === 'turn') {
    dollFace = Math.min(1, dollFace + 1/36);
    if (pt <= 0) {
      phase = 'red';
      pt = Math.max(70, 130 - wave * 5) + Math.floor(Math.random() * 60);
      for (var i = 0; i < PL.length; i++) {
        var p = PL[i];
        if (!p.dead && !p.won && p.mv && Math.random() < 0.85) kill(p);
        p.mv = 0;
      }
    }
  }
  else if (phase === 'red') {
    for (var i = 0; i < PL.length; i++) {
      var p = PL[i];
      if (p.dead || p.won || !p.rk) continue;
      if (Math.random() < 0.004) {
        p.mv = 1; p.y -= p.spd * 0.4;
        if (Math.random() < 0.75) kill(p);
      }
    }
    if (pt <= 0) { phase = 'back'; pt = 36; }
  }
  else if (phase === 'back') {
    dollFace = Math.max(0, dollFace - 1/36);
    if (pt <= 0) { phase = 'green'; pt = Math.max(120, 200 - wave * 8) + Math.floor(Math.random() * 80); }
  }

  for (var i = 0; i < PL.length; i++) {
    if (PL[i].dead && PL[i].br < 18) PL[i].br += 0.2;
  }
  if (flash > 0) flash = Math.max(0, flash - 0.05);
  if (shk > 0) shk--;

  var alive = 0;
  var allDone = true;
  for (var i = 0; i < PL.length; i++) {
    if (!PL[i].dead) alive++;
    if (!PL[i].dead && !PL[i].won) allDone = false;
  }
  if (!nxt && allDone) nxt = 150;
  if (nxt > 0 && --nxt === 0) { wave++; init(); }
}

function el(x, y, rx, ry, fill, stroke, lw) {
  if (rx <= 0 || ry <= 0) return;
  cx.beginPath();
  cx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  if (fill) { cx.fillStyle = fill; cx.fill(); }
  if (stroke) { cx.strokeStyle = stroke; cx.lineWidth = lw || 1; cx.stroke(); }
}

function drawField() {
  // Sky
  var sky = cx.createLinearGradient(0, HH, 0, H * 0.5);
  sky.addColorStop(0, '#7ec8e3');
  sky.addColorStop(1, '#b8dff0');
  cx.fillStyle = sky;
  cx.fillRect(0, HH, W, H * 0.5 - HH);

  // Ground
  var gr = cx.createLinearGradient(0, H * 0.47, 0, H);
  gr.addColorStop(0, '#c8a86a');
  gr.addColorStop(0.08, '#d4b478');
  gr.addColorStop(1, '#b09050');
  cx.fillStyle = gr;
  cx.fillRect(0, H * 0.46, W, H - H * 0.46);

  // Clouds
  cx.fillStyle = '#fff';
  var clouds = [[W*0.1, HH+30, 30, 12],[W*0.55, HH+22, 46, 17],[W*0.83, HH+35, 25, 10]];
  for (var i = 0; i < clouds.length; i++) {
    var c = clouds[i];
    el(c[0], c[1], c[2], c[3], '#fff');
    el(c[0]-c[2]*0.35, c[1]+c[3]*0.4, c[2]*0.55, c[3]*0.65, '#fff');
    el(c[0]+c[2]*0.35, c[1]+c[3]*0.4, c[2]*0.55, c[3]*0.65, '#fff');
  }

  // Dead tree
  var tx = W * 0.5, ty = H * 0.46;
  cx.strokeStyle = '#3a2a18'; cx.lineCap = 'round';
  cx.lineWidth = 5;
  cx.beginPath(); cx.moveTo(tx, ty); cx.lineTo(tx, ty - 55); cx.stroke();
  cx.lineWidth = 2;
  var br = [[-16,-16,-32,-36],[-10,-14,-4,-32],[16,-16,32,-36],[10,-14,4,-32],[-22,-7,-34,2],[22,-7,34,2]];
  for (var i = 0; i < br.length; i++) {
    var b = br[i];
    cx.beginPath();
    cx.moveTo(tx + b[0]*0.75, ty + b[1]*0.75);
    cx.lineTo(tx + b[2]*0.82, ty + b[3]*0.82);
    cx.stroke();
  }

  // Pink finish line
  cx.strokeStyle = 'rgba(255,60,120,0.95)'; cx.lineWidth = 3; cx.setLineDash([]);
  cx.beginPath(); cx.moveTo(0, FY); cx.lineTo(W, FY); cx.stroke();
  cx.fillStyle = 'rgba(255,60,120,0.1)'; cx.fillRect(0, FY-5, W, 10);

  // Side guards on field
  var gy = FY + (SY - FY) * 0.3;
  drawGuard(W*0.04, gy, 0.75);
  drawGuard(W*0.13, gy+18, 0.72);
  drawGuard(W*0.87, gy, 0.75);
  drawGuard(W*0.96, gy+18, 0.72);
}

function drawGuard(gx, gy, s) {
  cx.fillStyle = '#7a1515';
  cx.fillRect(gx - 6*s, gy - 20*s, 12*s, 20*s);
  el(gx, gy - 26*s, 6*s, 7*s, '#f0c090');
  el(gx, gy - 26*s, 5.5*s, 6.5*s, '#cc1111');
}

function drawDoll() {
  var dx = W * 0.5;
  var dy = HH + (H - HH) * 0.1;
  var facing = dollFace > 0.5;

  cx.save();
  if (facing) { cx.translate(W, 0); cx.scale(-1, 1); }
  var d = facing ? W - dx : dx;

  el(d, dy+4, 12, 4, 'rgba(0,0,0,0.2)');

  // dress
  cx.fillStyle = '#e07818';
  cx.beginPath();
  cx.moveTo(d-11, dy-52); cx.lineTo(d+11, dy-52);
  cx.lineTo(d+15, dy-14); cx.lineTo(d-15, dy-14);
  cx.closePath(); cx.fill();
  cx.strokeStyle = '#c06010'; cx.lineWidth = 1; cx.stroke();

  // legs
  cx.strokeStyle = '#fff'; cx.lineWidth = 3.5; cx.lineCap = 'round';
  cx.beginPath(); cx.moveTo(d-5, dy-14); cx.lineTo(d-6, dy+3); cx.stroke();
  cx.beginPath(); cx.moveTo(d+5, dy-14); cx.lineTo(d+6, dy+3); cx.stroke();
  el(d-6, dy+5, 4, 3, '#111');
  el(d+6, dy+5, 4, 3, '#111');

  // neck + head
  cx.fillStyle = '#f0c090'; cx.fillRect(d-4, dy-65, 8, 13);
  el(d, dy-75, 12, 14, '#f0c090');

  // hair
  cx.fillStyle = '#111';
  cx.beginPath(); cx.ellipse(d, dy-82, 13, 9, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(d, dy-69, 5, 6, 0, 0, Math.PI*2); cx.fill();

  if (facing) {
    el(d-4.5, dy-76, 3.5, 5, '#111');
    el(d+4.5, dy-76, 3.5, 5, '#111');
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(d-3.5, dy-77.5, 1.2, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(d+5.5, dy-77.5, 1.2, 0, Math.PI*2); cx.fill();
    cx.strokeStyle = '#904030'; cx.lineWidth = 1.4;
    cx.beginPath(); cx.arc(d, dy-69, 3.5, 0.2, 2.9); cx.stroke();
  }
  cx.restore();

  // guards near doll
  [W*0.1, W*0.21, W*0.79, W*0.9].forEach(function(gx) { drawGuard(gx, dy+8, 0.7); });
}

function drawPlayer(p) {
  if (p.won) return;
  var px = p.x, py = p.y;

  if (p.dead) {
    if (p.br > 0) {
      var g = cx.createRadialGradient(px, py, 0, px, py, p.br);
      g.addColorStop(0, 'rgba(180,0,0,0.9)');
      g.addColorStop(1, 'rgba(80,0,0,0)');
      cx.beginPath(); cx.ellipse(px, py+2, p.br, p.br*0.35, 0, 0, Math.PI*2); cx.fillStyle = g; cx.fill();
    }
    cx.save(); cx.translate(px, py); cx.rotate(Math.PI/2);
    cx.fillStyle = SUIT; cx.fillRect(-7,-11,14,20);
    el(0, -12, 5, 4, '#f0c090');
    cx.restore();
    return;
  }

  cx.save(); cx.translate(px, py);
  el(0, 3, 7, 2.2, 'rgba(0,0,0,0.15)');

  var la = p.mv ? Math.sin(p.lt) * 0.42 : 0;
  cx.strokeStyle = SUIT; cx.lineWidth = 4; cx.lineCap = 'square';
  cx.beginPath(); cx.moveTo(-2,0); cx.lineTo(-3 + Math.sin(la)*6, 13); cx.stroke();
  cx.beginPath(); cx.moveTo(2,0); cx.lineTo(3 - Math.sin(la)*6, 13); cx.stroke();

  cx.fillStyle = SUIT; cx.fillRect(-7,-19,14,20);

  cx.strokeStyle = SUIT; cx.lineWidth = 3; cx.lineCap = 'round';
  cx.beginPath(); cx.moveTo(-7,-15); cx.lineTo(-13,-6); cx.stroke();
  cx.beginPath(); cx.moveTo(7,-15); cx.lineTo(13,-6); cx.stroke();

  el(0, -26, 7.5, 8.5, '#f0c090');
  el(0, -26, 7, 8, p.mask);
  cx.strokeStyle = 'rgba(0,0,0,0.3)'; cx.lineWidth = 0.8; cx.stroke();

  cx.strokeStyle = 'rgba(0,0,0,0.5)'; cx.lineWidth = 1;
  var sh = p.num % 3;
  if (sh === 0) { cx.beginPath(); cx.arc(0,-26,3,0,Math.PI*2); cx.stroke(); }
  else if (sh === 1) { cx.beginPath(); cx.moveTo(0,-29); cx.lineTo(3,-23); cx.lineTo(-3,-23); cx.closePath(); cx.stroke(); }
  else { cx.strokeRect(-3,-29,6,6); }

  cx.fillStyle = 'rgba(255,255,255,0.9)';
  cx.font = 'bold 6px monospace';
  cx.textAlign = 'center';
  cx.fillText(p.num, 0, -9);
  cx.restore();
}

function drawHUD() {
  var pad = 8, hh = HH;
  cx.fillStyle = '#0a0a0a'; cx.fillRect(0, 0, W, hh);
  cx.strokeStyle = '#222'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(0,hh); cx.lineTo(W,hh); cx.stroke();

  // Timer
  var tw = Math.floor(W * 0.24);
  cx.fillStyle = '#111'; cx.fillRect(pad, pad, tw, hh-pad*2);
  cx.strokeStyle = '#222'; cx.lineWidth = 1; cx.strokeRect(pad, pad, tw, hh-pad*2);
  cx.fillStyle = '#ffcc00'; cx.font = Math.floor(hh*0.28) + 'px serif';
  cx.textAlign = 'left'; cx.fillText('♛', pad+6, pad+hh*0.32);
  var sec = Math.max(0, Math.ceil(pt/60));
  var mm = String(Math.floor(sec/60)).padStart(2,'0');
  var ss = String(sec%60).padStart(2,'0');
  cx.fillStyle = '#ff2222'; cx.font = 'bold ' + Math.floor(hh*0.5) + 'px monospace';
  cx.textAlign = 'center';
  cx.fillText(mm + ':' + ss, pad + tw/2, hh*0.78);

  // Eyes center
  var ew = Math.floor(W*0.38), ex = W/2 - ew/2, ey = pad, eh = hh - pad*2;
  cx.fillStyle = '#080303'; cx.fillRect(ex, ey, ew, eh);
  cx.strokeStyle = '#1a1010'; cx.lineWidth = 1.5; cx.strokeRect(ex, ey, ew, eh);
  cx.fillStyle = '#c8a070'; cx.fillRect(ex, ey, ew, eh*0.25);

  var e1x = ex + ew*0.27, e2x = ex + ew*0.73, ecy = ey + eh*0.58;
  var erx = ew*0.19, ery = eh*0.37;

  var eyes = [e1x, e2x];
  for (var i = 0; i < eyes.length; i++) {
    var exx = eyes[i];
    el(exx, ecy, erx, ery, '#e8dcc8');
    el(exx, ecy, erx*0.6, ery*0.76, '#2a1505');
    el(exx, ecy, erx*0.28, ery*0.48, '#000');
    cx.fillStyle = '#ffffff55';
    cx.beginPath(); cx.ellipse(exx+erx*0.2, ecy-ery*0.22, erx*0.09, ery*0.12, 0, 0, Math.PI*2); cx.fill();
    cx.fillStyle = '#c8a070';
    cx.beginPath(); cx.ellipse(exx, ey+eh*0.21, erx*1.08, ery*0.5, 0, Math.PI, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(exx, ey+eh*0.83, erx*1.06, ery*0.4, 0, 0, Math.PI); cx.fill();
    cx.strokeStyle = '#111'; cx.lineWidth = 1.5;
    cx.beginPath(); cx.ellipse(exx, ey+eh*0.21, erx*1.08, ery*0.5, 0, Math.PI, Math.PI*2); cx.stroke();
    cx.beginPath(); cx.ellipse(exx, ecy, erx, ery, 0, 0, Math.PI*2); cx.stroke();
  }

  // Light box
  var lx = ex+ew+pad+6, lw = Math.floor(W*0.13), lhh = Math.floor(hh*0.55);
  cx.fillStyle = '#111'; cx.fillRect(lx, pad, lw, lhh);
  cx.strokeStyle = '#222'; cx.lineWidth = 1; cx.strokeRect(lx, pad, lw, lhh);
  var isG = phase === 'green' || phase === 'back';
  var lcol = isG ? '#00ee44' : phase === 'red' ? '#ff2020' : '#ff9900';
  var glw = cx.createRadialGradient(lx+lw/2, pad+lhh/2, 0, lx+lw/2, pad+lhh/2, lhh*0.4);
  glw.addColorStop(0, lcol); glw.addColorStop(0.6, lcol+'55'); glw.addColorStop(1, 'rgba(0,0,0,0)');
  cx.beginPath(); cx.ellipse(lx+lw/2, pad+lhh/2, lhh*0.4, lhh*0.4, 0, 0, Math.PI*2); cx.fillStyle = glw; cx.fill();
  el(lx+lw/2, pad+lhh/2, lhh*0.22, lhh*0.22, lcol);
  cx.fillStyle = '#999'; cx.font = 'bold ' + Math.max(8, Math.floor(lhh*0.18)) + 'px monospace';
  cx.textAlign = 'center';
  cx.fillText(isG ? 'GREEN' : phase==='red' ? 'RED' : '...', lx+lw/2, pad+lhh*0.9);

  // Alive count
  var alive = 0;
  for (var i = 0; i < PL.length; i++) if (!PL[i].dead) alive++;
  var alh = hh - pad*2 - lhh - 4;
  var aly = pad + lhh + 4;
  cx.fillStyle = '#111'; cx.fillRect(lx, aly, lw, alh);
  cx.strokeStyle = '#222'; cx.lineWidth = 1; cx.strokeRect(lx, aly, lw, alh);
  cx.fillStyle = '#ff2222'; cx.font = 'bold ' + Math.floor(alh*0.6) + 'px monospace';
  cx.textAlign = 'center'; cx.fillText(alive, lx+lw/2, aly+alh*0.82);
  cx.fillStyle = '#333'; cx.font = '7px monospace';
  cx.fillText('W'+wave, lx+lw/2, aly+alh*0.97);
}

function drawOverlay() {
  if (flash > 0) {
    cx.fillStyle = 'rgba(255,200,100,' + (flash*0.2) + ')';
    cx.fillRect(0, 0, W, H);
  }
  var done = true;
  for (var i = 0; i < PL.length; i++) {
    if (!PL[i].dead && !PL[i].won) { done = false; break; }
  }
  if (done && nxt > 50) {
    cx.fillStyle = 'rgba(0,0,0,0.65)'; cx.fillRect(0,0,W,H);
    cx.fillStyle = '#00ff55'; cx.font = 'bold ' + Math.floor(W*0.07) + 'px monospace';
    cx.textAlign = 'center'; cx.fillText('WAVE CLEAR', W/2, H*0.44);
    var surv = 0;
    for (var i = 0; i < PL.length; i++) if (PL[i].won) surv++;
    cx.fillStyle = '#fff'; cx.font = Math.floor(W*0.04) + 'px monospace';
    cx.fillText(surv + ' survived', W/2, H*0.54);
    cx.fillStyle = '#666'; cx.font = Math.floor(W*0.03) + 'px monospace';
    cx.fillText('Next wave...', W/2, H*0.63);
  }
}

function render() {
  // Clear with black
  cx.fillStyle = '#000';
  cx.fillRect(0, 0, W, H);

  cx.save();
  if (shk > 0) cx.translate((Math.random()-.5)*shk*0.4, (Math.random()-.5)*shk*0.35);

  drawField();
  drawDoll();

  // Sort by Y and draw
  var sorted = PL.slice().sort(function(a,b){ return a.y - b.y; });
  for (var i = 0; i < sorted.length; i++) drawPlayer(sorted[i]);

  cx.restore();
  drawHUD();
  drawOverlay();
}

function loop() {
  try {
    update();
    render();
  } catch(e) {
    // Draw error on screen so we can debug
    cx.fillStyle = '#000'; cx.fillRect(0,0,W,H);
    cx.fillStyle = '#f00'; cx.font = '14px monospace'; cx.textAlign = 'left';
    cx.fillText('ERROR: ' + e.message, 10, 40);
    cx.fillText(e.stack ? e.stack.split('\n')[1] : '', 10, 70);
    return; // stop loop on error
  }
  requestAnimationFrame(loop);
}

window.addEventListener('resize', function() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
  HH = Math.floor(H * 0.2);
  FY = HH + Math.floor((H - HH) * 0.2);
  SY = H - 80;
  init();
});

document.addEventListener('touchstart', function(e){ e.preventDefault(); }, {passive:false});

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
