<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Red Light Green Light</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#000; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; touch-action:none; user-select:none; font-family:'Courier New',monospace; }
#gameCanvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ---- STATE ----
let phase = 'green'; // green | turning | red | gameover | win
let phaseTimer = 0;
let greenDur = 180, redDur = 140;
let dollAngle = 0; // 0=away, 1=facing
let turning = false;
let wave = 1, totalElim = 0;
let autoRestart = 0;
let flashAlpha = 0;
let shakeT = 0;

// ---- FIELD ----
const HUD_H = 0.18; // top HUD ratio
let FIELD_TOP, FIELD_BOT, FIELD_W;
let DOLL_Y, FINISH_Y, START_Y;

function calcField(){
  FIELD_TOP = H * HUD_H;
  FIELD_BOT = H;
  FIELD_W = W;
  DOLL_Y = FIELD_TOP + (FIELD_BOT - FIELD_TOP) * 0.08;
  FINISH_Y = FIELD_TOP + (FIELD_BOT - FIELD_TOP) * 0.18;
  START_Y = FIELD_BOT - 60;
}
calcField();

// ---- PLAYERS (all AI) ----
let players = [];
const SUITS = ['#3d7a4f','#4a8a5a','#2d6a3f'];
const MASKS = ['#cc2222','#dd3333','#bb1111'];

function makePlayer(i, total){
  const cols = 6;
  const col = i % cols;
  const row = Math.floor(i / cols);
  const spacing = W / (cols + 1);
  return {
    x: spacing * (col + 1) + (Math.random()-0.5)*18,
    y: START_Y - row * 34 - Math.random()*10,
    num: Math.floor(Math.random()*900)+100,
    suit: SUITS[Math.floor(Math.random()*SUITS.length)],
    mask: MASKS[Math.floor(Math.random()*MASKS.length)],
    speed: 0.55 + Math.random()*0.7,
    dead: false,
    won: false,
    moving: false,
    stopTimer: 0,
    reckless: Math.random()<0.2,
    legT: Math.random()*Math.PI*2,
    blood: 0,
    bloodR: 0,
    elimFrame: 0,
  };
}

function spawnPlayers(){
  players = [];
  const count = 24 + wave*2;
  for(let i=0;i<count;i++) players.push(makePlayer(i, count));
}

// ---- DOLL ----
function drawDoll(){
  const dx = W*0.5;
  const dy = DOLL_Y + 10;
  const facing = dollAngle > 0.5;

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(dx, dy+2, 14, 5, 0,0,Math.PI*2);ctx.fill();

  ctx.save();
  if(facing){ ctx.translate(W,0); ctx.scale(-1,1); }
  const ddx = facing ? W-dx : dx;

  // dress
  ctx.fillStyle='#e07818';
  ctx.beginPath();
  ctx.moveTo(ddx-11, dy-52);
  ctx.lineTo(ddx+11, dy-52);
  ctx.lineTo(ddx+16, dy-14);
  ctx.lineTo(ddx-16, dy-14);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#c06010';ctx.lineWidth=1;ctx.stroke();

  // legs
  ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(ddx-5,dy-14);ctx.lineTo(ddx-7,dy+2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ddx+5,dy-14);ctx.lineTo(ddx+7,dy+2);ctx.stroke();

  // neck
  ctx.fillStyle='#f0c090';
  ctx.fillRect(ddx-4,dy-64,8,12);

  // head
  ctx.fillStyle='#f0c090';
  ctx.beginPath();ctx.ellipse(ddx,dy-74,12,14,0,0,Math.PI*2);ctx.fill();

  // hair black
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(ddx,dy-80,13,10,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ddx,dy-68,5,6,0,0,Math.PI*2);ctx.fill();

  if(facing){
    // creepy eyes
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.ellipse(ddx-4,dy-75,3.5,4.5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ddx+4,dy-75,3.5,4.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(ddx-3.5,dy-76,1.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ddx+4.5,dy-76,1.2,0,Math.PI*2);ctx.fill();
    // mouth
    ctx.strokeStyle='#a05040';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(ddx,dy-69,4,0.2,Math.PI-0.2);ctx.stroke();
  }
  ctx.restore();

  // guards flanking doll
  drawGuardSide(W*0.12, DOLL_Y+8, '#8b1a1a', 0.72);
  drawGuardSide(W*0.22, DOLL_Y+8, '#8b1a1a', 0.72);
  drawGuardSide(W*0.78, DOLL_Y+8, '#8b1a1a', 0.72);
  drawGuardSide(W*0.88, DOLL_Y+8, '#8b1a1a', 0.72);
}

function drawGuardSide(x,y,suit,s){
  ctx.save();ctx.translate(x,y);
  // body
  ctx.fillStyle=suit;
  ctx.fillRect(-7*s,-20*s,14*s,20*s);
  // head
  ctx.fillStyle='#f0c090';
  ctx.beginPath();ctx.ellipse(0,-26*s,6*s,7*s,0,0,Math.PI*2);ctx.fill();
  // mask
  ctx.fillStyle='#cc1111';
  ctx.beginPath();ctx.ellipse(0,-26*s,5.5*s,6.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ---- DRAW PLAYER ----
function drawPlayer(p){
  if(p.dead){
    // lying flat with blood
    ctx.save();ctx.translate(p.x,p.y);
    // blood pool
    if(p.bloodR>0){
      const g=ctx.createRadialGradient(0,2,0,0,2,p.bloodR);
      g.addColorStop(0,'rgba(160,0,0,0.85)');
      g.addColorStop(1,'rgba(100,0,0,0)');
      ctx.beginPath();ctx.ellipse(0,2,p.bloodR,p.bloodR*0.4,0,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    }
    // body flat
    ctx.fillStyle=p.suit;
    ctx.save();ctx.rotate(Math.PI/2);
    ctx.fillRect(-8,-12,16,22);ctx.restore();
    // head
    ctx.fillStyle='#f0c090';
    ctx.beginPath();ctx.ellipse(0,-13,6,5,Math.PI/2,0,Math.PI*2);ctx.fill();
    ctx.restore();
    return;
  }
  if(p.won) return; // off screen

  const walking = p.moving;
  const s = 0.82;
  ctx.save();ctx.translate(p.x,p.y);

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();ctx.ellipse(0,2,9*s,3*s,0,0,Math.PI*2);ctx.fill();

  // legs
  ctx.strokeStyle=p.suit;ctx.lineWidth=4*s;ctx.lineCap='round';
  const la = walking ? Math.sin(p.legT)*0.45 : 0;
  ctx.beginPath();ctx.moveTo(-2*s,-1*s);ctx.lineTo(-4*s+Math.sin(la)*7*s,14*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(2*s,-1*s);ctx.lineTo(4*s+Math.sin(-la)*7*s,14*s);ctx.stroke();

  // body
  ctx.fillStyle=p.suit;
  ctx.fillRect(-8*s,-20*s,16*s,21*s);

  // arms
  ctx.strokeStyle=p.suit;ctx.lineWidth=3*s;
  ctx.beginPath();ctx.moveTo(-8*s,-16*s);ctx.lineTo(-14*s,-7*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8*s,-16*s);ctx.lineTo(14*s,-7*s);ctx.stroke();

  // head
  ctx.fillStyle='#f0c090';
  ctx.beginPath();ctx.ellipse(0,-27*s,7*s,8*s,0,0,Math.PI*2);ctx.fill();

  // mask
  ctx.fillStyle=p.mask;
  ctx.beginPath();ctx.ellipse(0,-27*s,6.5*s,7.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.8;ctx.stroke();

  // mask shape detail (circle/triangle/square randomly based on num)
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1;
  const shape = p.num % 3;
  if(shape===0){ ctx.beginPath();ctx.arc(0,-27*s,3*s,0,Math.PI*2);ctx.stroke(); }
  else if(shape===1){ ctx.beginPath();ctx.moveTo(0,-30*s);ctx.lineTo(3*s,-24*s);ctx.lineTo(-3*s,-24*s);ctx.closePath();ctx.stroke(); }
  else { ctx.strokeRect(-3*s,-30*s,6*s,6*s); }

  // number
  ctx.fillStyle='#fff';
  ctx.font=`bold ${6*s}px monospace`;
  ctx.textAlign='center';
  ctx.fillText(p.num, 0, -10*s);

  ctx.restore();
}

// ---- HUD ----
function drawHUD(){
  // black top bar
  ctx.fillStyle='#0a0a0a';
  ctx.fillRect(0,0,W,H*HUD_H);
  ctx.strokeStyle='#333';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H*HUD_H);ctx.lineTo(W,H*HUD_H);ctx.stroke();

  const hh = H*HUD_H;
  const pad = 8;

  // Timer (left)
  ctx.fillStyle='#111';
  ctx.fillRect(pad, pad, 88, hh-pad*2);
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(pad,pad,88,hh-pad*2);
  // crown icon
  ctx.fillStyle='#ffcc00';
  ctx.font=`${14}px serif`;
  ctx.textAlign='left';
  ctx.fillText('♛', pad+6, pad+18);
  // timer digits red
  ctx.fillStyle='#ff3333';
  ctx.font=`bold ${Math.floor(hh*0.45)}px monospace`;
  ctx.textAlign='center';
  const secs = Math.max(0,Math.ceil(phaseTimer/60 + (phase==='green'?greenDur:redDur)/60));
  const totalSecs = Math.max(0, Math.ceil(phaseTimer/60));
  ctx.fillText(`${String(Math.floor(totalSecs/60)).padStart(2,'0')}:${String(totalSecs%60).padStart(2,'0')}`, pad+44, hh*0.72);

  // Eyes center
  const eyeW = W*0.38, eyeH = hh-pad*2;
  const eyeX = W/2 - eyeW/2, eyeY = pad;
  ctx.fillStyle='#000';
  ctx.fillRect(eyeX, eyeY, eyeW, eyeH);
  ctx.strokeStyle='#444';ctx.lineWidth=2;ctx.strokeRect(eyeX,eyeY,eyeW,eyeH);

  // draw creepy eyes
  const ex1 = eyeX + eyeW*0.28, ex2 = eyeX + eyeW*0.72, ey = eyeY + eyeH*0.52;
  const erx = eyeW*0.2, ery = eyeH*0.38;
  // whites
  ctx.fillStyle='#f0e8d8';
  ctx.beginPath();ctx.ellipse(ex1,ey,erx,ery,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ex2,ey,erx,ery,0,0,Math.PI*2);ctx.fill();
  // irises
  ctx.fillStyle='#2a1a0a';
  ctx.beginPath();ctx.ellipse(ex1,ey,erx*0.55,ery*0.7,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ex2,ey,erx*0.55,ery*0.7,0,0,Math.PI*2);ctx.fill();
  // pupils
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(ex1,ey,erx*0.25,ery*0.35,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ex2,ey,erx*0.25,ery*0.35,0,0,Math.PI*2);ctx.fill();
  // eyelids top
  ctx.fillStyle='#c8a87a';
  ctx.beginPath();ctx.ellipse(ex1,eyeY+eyeH*0.22,erx*1.05,ery*0.5,0,Math.PI,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ex2,eyeY+eyeH*0.22,erx*1.05,ery*0.5,0,Math.PI,Math.PI*2);ctx.fill();

  // Light indicator - right of eyes
  const liX = W/2 + eyeW/2 + pad + 10;
  const liY = pad + 4;
  const liW = 70, liH = hh-pad*2-8;
  ctx.fillStyle='#111';ctx.fillRect(liX,liY,liW,liH);
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(liX,liY,liW,liH);
  const isGreen = phase==='green';
  const dotColor = isGreen ? '#00ff44' : phase==='red'?'#ff2222':'#ff8800';
  const glow = ctx.createRadialGradient(liX+liW/2,liY+liH*0.45,0,liX+liW/2,liY+liH*0.45,liH*0.38);
  glow.addColorStop(0,dotColor);
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(liX+liW/2,liY+liH*0.45,liH*0.38,0,Math.PI*2);
  ctx.fillStyle=glow;ctx.fill();
  ctx.beginPath();ctx.arc(liX+liW/2,liY+liH*0.45,liH*0.22,0,Math.PI*2);
  ctx.fillStyle=dotColor;ctx.fill();
  ctx.fillStyle='#aaa';ctx.font=`bold ${9}px monospace`;ctx.textAlign='center';
  ctx.fillText(isGreen?'GREEN':phase==='red'?'RED':'...', liX+liW/2, liY+liH*0.88);

  // Right stat box - alive count
  const rx = liX+liW+pad+4;
  const rw = W-rx-pad;
  ctx.fillStyle='#111';ctx.fillRect(rx,pad,rw,hh-pad*2);
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(rx,pad,rw,hh-pad*2);
  const alive = players.filter(p=>!p.dead).length;
  // mini player icon
  ctx.fillStyle='#4a8a5a';
  ctx.fillRect(rx+rw/2-5, pad+6, 10, 14);
  ctx.fillStyle='#f0c090';
  ctx.beginPath();ctx.arc(rx+rw/2,pad+5,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff3333';
  ctx.font=`bold ${Math.floor(hh*0.42)}px monospace`;
  ctx.textAlign='center';
  ctx.fillText(alive, rx+rw/2, hh*0.88);

  // wave label
  ctx.fillStyle='#555';ctx.font=`${9}px monospace`;
  ctx.fillText(`W${wave}`, rx+rw/2, pad+hh-pad*2-2);
}

// ---- FIELD ----
function drawField(){
  // sky
  const sky=ctx.createLinearGradient(0,H*HUD_H,0,H*0.46);
  sky.addColorStop(0,'#7ec8e3');sky.addColorStop(1,'#c8e8f8');
  ctx.fillStyle=sky;ctx.fillRect(0,H*HUD_H,W,H*0.3);

  // desert ground
  const gr=ctx.createLinearGradient(0,H*0.44,0,H);
  gr.addColorStop(0,'#c8a86a');gr.addColorStop(0.1,'#d4b478');gr.addColorStop(1,'#b89050');
  ctx.fillStyle=gr;ctx.fillRect(0,H*0.44,W,H-H*0.44);

  // horizon
  ctx.fillStyle='#b89050';ctx.fillRect(0,H*0.445,W,3);

  // clouds
  ctx.fillStyle='rgba(255,255,255,0.9)';
  [[W*0.12,H*0.21,30,12],[W*0.5,H*0.19,45,16],[W*0.82,H*0.22,28,10]].forEach(([cx,cy,rx,ry])=>{
    ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx-rx*0.35,cy+ry*0.4,rx*0.55,ry*0.65,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+rx*0.35,cy+ry*0.4,rx*0.55,ry*0.65,0,0,Math.PI*2);ctx.fill();
  });

  // dead tree
  const tx=W*0.5, ty=H*0.44;
  ctx.strokeStyle='#3a2a18';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx,ty-55);ctx.stroke();
  ctx.lineWidth=2.5;
  [[-20,-20,-40,-42],[-14,-18,-6,-40],[20,-20,40,-42],[14,-18,6,-40],[-28,-10,-42,-2],[28,-10,42,-2]].forEach(([dx1,dy1,dx2,dy2])=>{
    ctx.beginPath();ctx.moveTo(tx+dx1*0.7,ty+dy1*0.7);ctx.lineTo(tx+dx2*0.8,ty+dy2*0.8);ctx.stroke();
  });

  // finish line pink
  ctx.strokeStyle='rgba(255,80,120,0.9)';ctx.lineWidth=3;
  ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(0,FINISH_Y);ctx.lineTo(W,FINISH_Y);ctx.stroke();
  ctx.fillStyle='rgba(255,80,120,0.1)';
  ctx.fillRect(0,FINISH_Y-8,W,16);

  // side guards
  const gy = FINISH_Y + (START_Y-FINISH_Y)*0.3;
  drawGuardSide(W*0.04, gy, '#8b1a1a', 0.8);
  drawGuardSide(W*0.12, gy+20, '#8b1a1a', 0.78);
  drawGuardSide(W*0.88, gy, '#8b1a1a', 0.8);
  drawGuardSide(W*0.96, gy+20, '#8b1a1a', 0.78);
}

// ---- LOGIC ----
let globalTimer = 0;

function update(){
  globalTimer++;
  phaseTimer = Math.max(0, phaseTimer-1);

  // Phase logic
  if(phase==='green'){
    if(phaseTimer<=0){
      phase='turning'; dollAngle=0;
      phaseTimer=40; // turn duration
    }
    // Move all alive players forward
    for(const p of players){
      if(p.dead||p.won)continue;
      p.moving=true;
      p.y -= p.speed;
      p.legT += 0.18;
      if(p.y<=FINISH_Y){ p.won=true; p.y=FINISH_Y; }
    }
  } else if(phase==='turning'){
    dollAngle = Math.min(1, dollAngle + 1/40);
    if(phaseTimer<=0){
      phase='red';
      phaseTimer=redDur + Math.random()*80;
      // Kill movers
      for(const p of players){
        if(!p.dead&&!p.won&&p.moving&&Math.random()<0.85) killPlayer(p);
      }
      for(const p of players) p.moving=false;
    }
  } else if(phase==='red'){
    if(phaseTimer<=0){
      // Turn back
      phase='turning-back'; phaseTimer=40;
    }
    // Reckless players might move and die
    for(const p of players){
      if(p.dead||p.won)continue;
      if(p.reckless&&Math.random()<0.004){
        p.moving=true; p.y-=p.speed*0.5;
        if(Math.random()<0.7) killPlayer(p);
      }
    }
  } else if(phase==='turning-back'){
    dollAngle = Math.max(0, dollAngle - 1/40);
    if(phaseTimer<=0){
      phase='green';
      phaseTimer=greenDur + Math.random()*100;
    }
  }

  // Blood grow
  for(const p of players){
    if(p.dead&&p.bloodR<18) p.bloodR+=0.25;
  }

  // Flash
  if(flashAlpha>0) flashAlpha-=0.06;
  if(shakeT>0) shakeT--;

  // Check end
  const alive = players.filter(p=>!p.dead);
  if(alive.length===0||(alive.every(p=>p.won))){
    if(phase!=='gameover'&&phase!=='win'){
      phase='win'; phaseTimer=180; autoRestart=180;
    }
  }
  if(autoRestart>0){
    autoRestart--;
    if(autoRestart<=0){ wave++; startWave(); }
  }
}

function killPlayer(p){
  if(p.dead)return;
  p.dead=true; p.moving=false;
  flashAlpha=Math.min(flashAlpha+0.25,1);
  shakeT=Math.max(shakeT,10);
  totalElim++;
}

function startWave(){
  calcField();
  spawnPlayers();
  phase='green';
  phaseTimer=greenDur+120;
  dollAngle=0;
  autoRestart=0;
  greenDur=Math.max(100,180-wave*10);
  redDur=Math.max(80,140-wave*5);
}

// ---- OVERLAY ----
function drawOverlay(){
  if(phase==='win'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#00ff66';ctx.font=`bold ${W*0.07}px monospace`;ctx.textAlign='center';
    ctx.fillText('WAVE CLEAR', W/2, H*0.45);
    ctx.fillStyle='#fff';ctx.font=`${W*0.04}px monospace`;
    ctx.fillText(`Wave ${wave} complete`, W/2, H*0.55);
    ctx.fillStyle='#ffcc00';ctx.font=`${W*0.035}px monospace`;
    ctx.fillText(`${players.filter(p=>p.won).length} survived`, W/2, H*0.63);
    ctx.fillStyle='#888';ctx.font=`${W*0.03}px monospace`;
    ctx.fillText('Next wave starting...', W/2, H*0.72);
  }

  // gun flash
  if(flashAlpha>0){
    ctx.fillStyle=`rgba(255,200,150,${flashAlpha*0.3})`;
    ctx.fillRect(0,0,W,H);
  }
}

// ---- RENDER ----
function render(){
  ctx.save();
  if(shakeT>0){
    ctx.translate((Math.random()-0.5)*shakeT*0.5,(Math.random()-0.5)*shakeT*0.4);
  }

  drawField();
  drawDoll();

  // Sort players by Y (painter's algorithm - lower = in front)
  const sorted=[...players].sort((a,b)=>a.y-b.y);
  for(const p of sorted) drawPlayer(p);

  ctx.restore();
  drawHUD();
  drawOverlay();
}

// ---- LOOP ----
function loop(){ update(); render(); requestAnimationFrame(loop); }

// ---- TAP = nothing, fully AI ----
canvas.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
canvas.addEventListener('mousedown',()=>{});

// ---- START ----
startWave();
requestAnimationFrame(loop);
</script>
</body>
</html>
