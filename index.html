<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Red Light Green Light</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;overflow:hidden;touch-action:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W=cv.width=window.innerWidth;
let H=cv.height=window.innerHeight;

// Layout constants - recalculate after resize
let HH,FY,SY;
function calcLayout(){
  HH=Math.floor(H*0.2);
  FY=HH+Math.floor((H-HH)*0.2);
  SY=H-80;
}
calcLayout();

// Game state
let phase='green',pt=220,dollFace=0,wave=1,shk=0,flash=0,nxt=0;
const GD=()=>Math.max(120,200-wave*8);
const RD=()=>Math.max(70,130-wave*5);

// Players
let PL=[];
const SUIT='#3d7a50';
const MASKS=['#cc2020','#bb1515','#dd2525'];

function mkP(i){
  const cols=5,sp=W/(cols+1);
  return{
    x:sp*(i%cols+1)+(Math.random()-.5)*12,
    y:SY-Math.floor(i/cols)*36-Math.random()*8,
    num:100+Math.floor(Math.random()*900),
    mask:MASKS[i%3],
    spd:0.5+Math.random()*0.65,
    dead:0,won:0,mv:0,lt:Math.random()*6.28,
    rk:Math.random()<0.18,br:0
  };
}

function init(){
  calcLayout();
  PL=Array.from({length:24+wave*2},(_,i)=>mkP(i));
  phase='green';pt=GD()+80;dollFace=0;flash=0;shk=0;nxt=0;
}

function kill(p){
  if(p.dead||p.won)return;
  p.dead=1;p.mv=0;
  flash=Math.min(flash+0.3,1);
  shk=Math.max(shk,12);
}

function update(){
  pt=Math.max(0,pt-1);

  if(phase==='green'){
    PL.forEach(p=>{
      if(p.dead||p.won)return;
      p.mv=1;p.y-=p.spd;p.lt+=0.16;
      if(p.y<=FY){p.won=1;p.y=FY;}
    });
    if(pt<=0){phase='turn';pt=36;dollFace=0;}
  }
  else if(phase==='turn'){
    dollFace=Math.min(1,dollFace+1/36);
    if(pt<=0){
      phase='red';pt=RD()+Math.floor(Math.random()*60);
      PL.forEach(p=>{
        if(!p.dead&&!p.won&&p.mv&&Math.random()<0.85)kill(p);
        p.mv=0;
      });
    }
  }
  else if(phase==='red'){
    PL.forEach(p=>{
      if(p.dead||p.won||!p.rk)return;
      if(Math.random()<0.004){p.mv=1;p.y-=p.spd*0.4;if(Math.random()<0.75)kill(p);}
    });
    if(pt<=0){phase='back';pt=36;}
  }
  else if(phase==='back'){
    dollFace=Math.max(0,dollFace-1/36);
    if(pt<=0){phase='green';pt=GD()+Math.floor(Math.random()*80);}
  }

  PL.forEach(p=>{if(p.dead&&p.br<18)p.br+=0.2;});
  if(flash>0)flash=Math.max(0,flash-0.05);
  if(shk>0)shk--;

  const alive=PL.filter(p=>!p.dead);
  if(!nxt&&(!alive.length||alive.every(p=>p.won)))nxt=150;
  if(nxt>0&&--nxt===0){wave++;init();}
}

// Drawing helpers
function ellipse(x,y,rx,ry,fill,stroke,lw){
  cx.beginPath();cx.ellipse(x,y,Math.max(0.1,rx),Math.max(0.1,ry),0,0,Math.PI*2);
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=lw||1;cx.stroke();}
}

function drawField(){
  // Clear first
  cx.clearRect(0,0,W,H);

  // Sky gradient
  const sky=cx.createLinearGradient(0,HH,0,H*0.5);
  sky.addColorStop(0,'#7ec8e3');
  sky.addColorStop(1,'#b8dff0');
  cx.fillStyle=sky;
  cx.fillRect(0,HH,W,H*0.5);

  // Ground gradient
  const gr=cx.createLinearGradient(0,H*0.47,0,H);
  gr.addColorStop(0,'#c8a86a');
  gr.addColorStop(0.08,'#d4b478');
  gr.addColorStop(1,'#b09050');
  cx.fillStyle=gr;
  cx.fillRect(0,H*0.46,W,H);

  // Clouds
  [[W*0.1,HH+30,30,12],[W*0.55,HH+20,48,17],[W*0.83,HH+35,26,10]].forEach(([ex,ey,rx,ry])=>{
    ellipse(ex,ey,rx,ry,'#fff');
    ellipse(ex-rx*0.35,ey+ry*0.4,rx*0.55,ry*0.65,'#fff');
    ellipse(ex+rx*0.35,ey+ry*0.4,rx*0.55,ry*0.65,'#fff');
  });

  // Dead tree
  const tx=W*0.5,ty=H*0.46;
  cx.strokeStyle='#3a2a18';cx.lineCap='round';
  cx.lineWidth=5;cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(tx,ty-55);cx.stroke();
  cx.lineWidth=2;
  [[-16,-16,-32,-36],[-10,-14,-4,-32],[16,-16,32,-36],[10,-14,4,-32],[-22,-7,-34,2],[22,-7,34,2]]
  .forEach(([a,b,c,d])=>{
    cx.beginPath();cx.moveTo(tx+a*0.75,ty+b*0.75);cx.lineTo(tx+c*0.82,ty+d*0.82);cx.stroke();
  });

  // Pink finish line
  cx.strokeStyle='rgba(255,60,120,0.95)';cx.lineWidth=3;cx.setLineDash([]);
  cx.beginPath();cx.moveTo(0,FY);cx.lineTo(W,FY);cx.stroke();
  cx.fillStyle='rgba(255,60,120,0.1)';cx.fillRect(0,FY-5,W,10);

  // Side guards on field
  const gy=FY+(SY-FY)*0.3;
  drawGuard(W*0.04,gy,0.75);
  drawGuard(W*0.13,gy+18,0.72);
  drawGuard(W*0.87,gy,0.75);
  drawGuard(W*0.96,gy+18,0.72);
}

function drawGuard(gx,gy,s){
  cx.fillStyle='#7a1515';
  cx.fillRect(gx-6*s,gy-20*s,12*s,20*s);
  ellipse(gx,gy-26*s,6*s,7*s,'#f0c090');
  ellipse(gx,gy-26*s,5.5*s,6.5*s,'#cc1111');
}

function drawDoll(){
  const dx=W*0.5;
  const dy=HH+(H-HH)*0.1;
  const facing=dollFace>0.5;

  cx.save();
  if(facing){cx.translate(W,0);cx.scale(-1,1);}
  const d=facing?W-dx:dx;

  // shadow
  ellipse(d,dy+4,12,4,'rgba(0,0,0,0.2)');

  // dress
  cx.fillStyle='#e07818';
  cx.beginPath();
  cx.moveTo(d-11,dy-52);cx.lineTo(d+11,dy-52);
  cx.lineTo(d+15,dy-14);cx.lineTo(d-15,dy-14);
  cx.closePath();cx.fill();
  cx.strokeStyle='#c06010';cx.lineWidth=1;cx.stroke();

  // legs
  cx.strokeStyle='#fff';cx.lineWidth=3.5;cx.lineCap='round';
  cx.beginPath();cx.moveTo(d-5,dy-14);cx.lineTo(d-6,dy+3);cx.stroke();
  cx.beginPath();cx.moveTo(d+5,dy-14);cx.lineTo(d+6,dy+3);cx.stroke();
  ellipse(d-6,dy+5,4,3,'#111');
  ellipse(d+6,dy+5,4,3,'#111');

  // neck + head
  cx.fillStyle='#f0c090';cx.fillRect(d-4,dy-65,8,13);
  ellipse(d,dy-75,12,14,'#f0c090');

  // hair
  cx.fillStyle='#111';
  cx.beginPath();cx.ellipse(d,dy-82,13,9,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(d,dy-69,5,6,0,0,Math.PI*2);cx.fill();

  if(facing){
    ellipse(d-4.5,dy-76,3.5,5,'#111');
    ellipse(d+4.5,dy-76,3.5,5,'#111');
    cx.fillStyle='#fff';
    cx.beginPath();cx.arc(d-3.5,dy-77.5,1.2,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(d+5.5,dy-77.5,1.2,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#904030';cx.lineWidth=1.4;
    cx.beginPath();cx.arc(d,dy-69,3.5,0.2,2.9);cx.stroke();
  }
  cx.restore();

  // flanking guards near doll
  [W*0.1,W*0.21,W*0.79,W*0.9].forEach(gx=>drawGuard(gx,dy+8,0.7));
}

function drawPlayer(p){
  if(p.won)return;
  const{x:px,y:py,mask,mv,lt,dead,br,num}=p;

  if(dead){
    if(br>0){
      const g=cx.createRadialGradient(px,py,0,px,py,br);
      g.addColorStop(0,'rgba(180,0,0,0.9)');
      g.addColorStop(1,'rgba(80,0,0,0)');
      cx.beginPath();cx.ellipse(px,py+2,br,br*0.35,0,0,Math.PI*2);cx.fillStyle=g;cx.fill();
    }
    cx.save();cx.translate(px,py);cx.rotate(Math.PI/2);
    cx.fillStyle=SUIT;cx.fillRect(-7,-11,14,20);
    ellipse(0,-12,5,4,'#f0c090');
    cx.restore();
    return;
  }

  cx.save();cx.translate(px,py);

  ellipse(0,3,7,2.2,'rgba(0,0,0,0.15)');

  const la=mv?Math.sin(lt)*0.42:0;
  cx.strokeStyle=SUIT;cx.lineWidth=4;cx.lineCap='square';
  cx.beginPath();cx.moveTo(-2,0);cx.lineTo(-3+Math.sin(la)*6,13);cx.stroke();
  cx.beginPath();cx.moveTo(2,0);cx.lineTo(3-Math.sin(la)*6,13);cx.stroke();

  cx.fillStyle=SUIT;cx.fillRect(-7,-19,14,20);

  cx.strokeStyle=SUIT;cx.lineWidth=3;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-7,-15);cx.lineTo(-13,-6);cx.stroke();
  cx.beginPath();cx.moveTo(7,-15);cx.lineTo(13,-6);cx.stroke();

  ellipse(0,-26,7.5,8.5,'#f0c090');
  ellipse(0,-26,7,8,mask);
  cx.strokeStyle='rgba(0,0,0,0.3)';cx.lineWidth=0.8;cx.stroke();

  cx.strokeStyle='rgba(0,0,0,0.5)';cx.lineWidth=1;
  const sh=num%3;
  if(sh===0){cx.beginPath();cx.arc(0,-26,3,0,Math.PI*2);cx.stroke();}
  else if(sh===1){cx.beginPath();cx.moveTo(0,-29);cx.lineTo(3,-23);cx.lineTo(-3,-23);cx.closePath();cx.stroke();}
  else{cx.strokeRect(-3,-29,6,6);}

  cx.fillStyle='rgba(255,255,255,0.9)';cx.font='bold 6px monospace';
  cx.textAlign='center';cx.fillText(num,0,-9);

  cx.restore();
}

function drawHUD(){
  const pad=8,hh=HH;
  cx.fillStyle='#0a0a0a';cx.fillRect(0,0,W,hh);
  cx.strokeStyle='#222';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,hh);cx.lineTo(W,hh);cx.stroke();

  // Timer
  const tw=Math.floor(W*0.24);
  cx.fillStyle='#111';cx.fillRect(pad,pad,tw,hh-pad*2);
  cx.strokeStyle='#222';cx.lineWidth=1;cx.strokeRect(pad,pad,tw,hh-pad*2);
  cx.fillStyle='#ffcc00';cx.font=`${Math.floor(hh*0.28)}px serif`;
  cx.textAlign='left';cx.fillText('♛',pad+6,pad+hh*0.32);
  const sec=Math.max(0,Math.ceil(pt/60));
  cx.fillStyle='#ff2222';cx.font=`bold ${Math.floor(hh*0.5)}px monospace`;
  cx.textAlign='center';
  cx.fillText(`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`,pad+tw/2,hh*0.78);

  // Eyes
  const ew=Math.floor(W*0.38),ex=W/2-ew/2,ey=pad,eh=hh-pad*2;
  cx.fillStyle='#080303';cx.fillRect(ex,ey,ew,eh);
  cx.strokeStyle='#1a1010';cx.lineWidth=1.5;cx.strokeRect(ex,ey,ew,eh);

  // skin forehead
  cx.fillStyle='#c8a070';cx.fillRect(ex,ey,ew,eh*0.25);

  const e1x=ex+ew*0.27,e2x=ex+ew*0.73,ecy=ey+eh*0.58;
  const erx=ew*0.19,ery=eh*0.37;

  [e1x,e2x].forEach(exx=>{
    ellipse(exx,ecy,erx,ery,'#e8dcc8');
    ellipse(exx,ecy,erx*0.6,ery*0.76,'#2a1505');
    ellipse(exx,ecy,erx*0.28,ery*0.48,'#000');
    cx.fillStyle='#ffffff66';
    cx.beginPath();cx.ellipse(exx+erx*0.2,ecy-ery*0.22,erx*0.09,ery*0.12,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#c8a070';
    cx.beginPath();cx.ellipse(exx,ey+eh*0.21,erx*1.08,ery*0.5,0,Math.PI,Math.PI*2);cx.fill();
    cx.beginPath();cx.ellipse(exx,ey+eh*0.83,erx*1.06,ery*0.4,0,0,Math.PI);cx.fill();
    cx.strokeStyle='#111';cx.lineWidth=1.5;
    cx.beginPath();cx.ellipse(exx,ey+eh*0.21,erx*1.08,ery*0.5,0,Math.PI,Math.PI*2);cx.stroke();
    cx.beginPath();cx.ellipse(exx,ecy,erx,ery,0,0,Math.PI*2);cx.stroke();
  });

  // Light indicator
  const lx=ex+ew+pad+6,lw=Math.floor(W*0.13),lhh=Math.floor(hh*0.55);
  cx.fillStyle='#111';cx.fillRect(lx,pad,lw,lhh);
  cx.strokeStyle='#222';cx.lineWidth=1;cx.strokeRect(lx,pad,lw,lhh);
  const isG=phase==='green'||phase==='back';
  const lcol=isG?'#00ee44':phase==='red'?'#ff2020':'#ff9900';
  const glw=cx.createRadialGradient(lx+lw/2,pad+lhh/2,0,lx+lw/2,pad+lhh/2,lhh*0.4);
  glw.addColorStop(0,lcol);glw.addColorStop(0.6,lcol+'55');glw.addColorStop(1,'rgba(0,0,0,0)');
  cx.beginPath();cx.ellipse(lx+lw/2,pad+lhh/2,lhh*0.4,lhh*0.4,0,0,Math.PI*2);cx.fillStyle=glw;cx.fill();
  ellipse(lx+lw/2,pad+lhh/2,lhh*0.22,lhh*0.22,lcol);
  cx.fillStyle='#999';cx.font=`bold ${Math.max(8,lhh*0.18)}px monospace`;cx.textAlign='center';
  cx.fillText(isG?'GREEN':phase==='red'?'RED':'...',lx+lw/2,pad+lhh*0.9);

  // Alive count
  const alive=PL.filter(p=>!p.dead).length;
  const alx=lx,aly=pad+lhh+4,alh=hh-pad*2-lhh-4;
  cx.fillStyle='#111';cx.fillRect(alx,aly,lw,alh);
  cx.strokeStyle='#222';cx.lineWidth=1;cx.strokeRect(alx,aly,lw,alh);
  cx.fillStyle='#ff2222';cx.font=`bold ${Math.floor(alh*0.6)}px monospace`;cx.textAlign='center';
  cx.fillText(alive,alx+lw/2,aly+alh*0.82);

  cx.fillStyle='#333';cx.font='7px monospace';
  cx.fillText(`W${wave}`,alx+lw/2,aly+alh*0.97);
}

function drawOverlay(){
  if(flash>0){
    cx.fillStyle=`rgba(255,200,100,${flash*0.2})`;
    cx.fillRect(0,0,W,H);
  }
  const done=PL.length&&PL.every(p=>p.dead||p.won);
  if(done&&nxt>50){
    cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,W,H);
    cx.fillStyle='#00ff55';cx.font=`bold ${Math.floor(W*0.07)}px monospace`;cx.textAlign='center';
    cx.fillText('WAVE CLEAR',W/2,H*0.44);
    cx.fillStyle='#fff';cx.font=`${Math.floor(W*0.04)}px monospace`;
    cx.fillText(`${PL.filter(p=>p.won).length} survived`,W/2,H*0.54);
    cx.fillStyle='#666';cx.font=`${Math.floor(W*0.03)}px monospace`;
    cx.fillText('Next wave...',W/2,H*0.63);
  }
}

function render(){
  cx.save();
  if(shk>0){
    cx.translate((Math.random()-.5)*shk*0.4,(Math.random()-.5)*shk*0.35);
  }
  drawField();
  drawDoll();
  [...PL].sort((a,b)=>a.y-b.y).forEach(drawPlayer);
  cx.restore();
  drawHUD();
  drawOverlay();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

window.addEventListener('resize',()=>{
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  init();
});

cv.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
